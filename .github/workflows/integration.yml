name: SMTP Integration Tests

on:
    workflow_dispatch:

jobs:
    greenmail-tests:
        runs-on: ubuntu-latest
        services:
            greenmail:
                image: greenmail/standalone:2.1.8
                ports:
                    - 3025:3025
                    - 3143:3143

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Run GreenMail integration tests
              env:
                  GREENMAIL_EXTERNAL: "1"
                  GREENMAIL_HOST: "localhost"
                  GREENMAIL_SMTP_PORT: "3025"
                  GREENMAIL_IMAP_PORT: "3143"
              run: cargo test --test smtp_greenmail -- --ignored --nocapture
